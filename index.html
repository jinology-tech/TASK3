<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <title>양팔 저울 - 과제 4</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px 0 60px;
      text-align: center;
      background-color: #ffecec;
      user-select: none;
      transition: background-color 0.5s;
    }

    .wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 10px;
    }

    .balance-container {
      position: relative;
      width: 80vw;
      height: 60vh;
    }

    .beam-container {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 2vh;
      transform-origin: center center;
      transition: transform 0.5s;
    }

    .beam {
      width: 100%;
      height: 100%;
      background-color: #4472C4;
      position: relative;
    }

    .pivot {
      position: absolute;
      width: 2vw;
      height: 12vh;
      background-color: #4472C4;
      left: 50%;
      transform: translateX(-50%);
      top: 52%;
      z-index: 2;
    }

    .base {
      position: absolute;
      width: 20vw;
      height: 3vh;
      background-color: #4472C4;
      left: 50%;
      top: 75%;
      transform: translateX(-50%);
    }

    .scale {
      position: absolute;
      width: 16vw;
      height: 8vh;
      background-color: white;
      border: 3px solid #aaa;
      border-top: none;
      border-radius: 0 0 50% 50%;
      overflow: visible;
      top: -7.5vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #leftScale { left: 3vw; }
    #rightScale { right: 3vw; }

    .slider-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      width: 15vw;
      gap: 1px;
    }

    #leftSlider { accent-color: #3fa9f5; }
    #rightSlider { accent-color: #ff7f00; }

    .slider {
      writing-mode: bt-lr;
      transform: rotate(270deg);
      width: 50vh;
      height: 5vh;
    }

    .weight-block {
      position: absolute;
      width: 1.5vh;
      height: 1.5vh;
      border-radius: 10%;
    }

    .left-block { background-color: #3fa9f5; }
    .right-block { background-color: #f56c6c; }
    .left-fixed { background-color: pink; }
    .right-fixed { background-color: gold; }

    .equation-display {
      margin-top: 50px;
      font-size: 6vh;
      font-weight: bold;
    }

    .box, .triangle, .circle {
      background-color: #ccc;
      display: inline-block;
      width: 100px;
      height: 100px;
      line-height: 100px;
      vertical-align: middle;
      font-size: 40px;
      text-align: center;
      margin: 0 10px;
      font-weight: bold;
      background-color: #fff;
    }

    .box {
      border: 2px solid #888;
    }

    .triangle {
      border: 2px solid #888;
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
    }

    .circle {
      background-color: #ccc;
      border-radius: 50%;
      border: 2px solid #888;
    }

    /* 내비게이션 버튼 스타일 */
    .prev-button {
      position: fixed;
      left: 10px;
      bottom: 10px;
      padding: 10px 20px;
      background-color: #6c757d;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      font-family: sans-serif;
      font-size: 16px;
    }
    .prev-button:hover {
      background-color: #5a6268;
    }
  </style>
</head>
<body>
  <h1>양팔 저울 - 활동 3</h1>

  <div class="wrapper">
    <div class="slider-container">
      <input type="range" id="leftSlider" class="slider" min="0" max="20" value="0">
    </div>

    <div class="balance-container">
      <div class="beam-container" id="beamContainer">
        <div class="beam" id="beam"></div>
        <div class="scale" id="leftScale"></div>
        <div class="scale" id="rightScale"></div>
      </div>
      <div class="pivot"></div>
      <div class="base"></div>
    </div>

    <div class="slider-container">
      <input type="range" id="rightSlider" class="slider" min="0" max="20" value="0">
    </div>
  </div>

  <div class="equation-display">
    2 + <span class="box" id="leftVal">0</span>
    <span class="circle" id="relation">=</span>
    3 + <span class="triangle" id="rightVal">0</span>
  </div>

  <script>
    let leftWeight = 2;
    let rightWeight = 3;

    function updateBlocks(scaleId, weight, isLeft) {
      const scale = document.getElementById(scaleId);
      scale.querySelectorAll('.weight-block').forEach(el => el.remove());

      const blockSize = 18;
      const fixedCount = isLeft ? 2 : 3;

      for (let i = 0; i < fixedCount; i++) {
        const fixed = document.createElement('div');
        fixed.className = 'weight-block ' + (isLeft ? 'left-fixed' : 'right-fixed');
        const x = (i % 10) * blockSize + 10;
        const y = Math.floor(i / 10) * blockSize + 10;
        fixed.style.left = `${x}px`;
        fixed.style.top = `${y}px`;
        scale.appendChild(fixed);
      }

      for (let i = 0; i < weight; i++) {
        const block = document.createElement('div');
        block.className = 'weight-block ' + (isLeft ? 'left-block' : 'right-block');
        const index = i + fixedCount;
        const x = (index % 10) * blockSize + 10;
        const y = Math.floor(index / 10) * blockSize + 10;
        block.style.left = `${x}px`;
        block.style.top = `${y}px`;
        scale.appendChild(block);
      }
    }

    function updateBalance() {
      const beamContainer = document.getElementById('beamContainer');
      const diff = leftWeight - rightWeight;
      const maxAngle = 15;
      const angle = Math.max(-maxAngle, Math.min(maxAngle, -diff * 2));
      beamContainer.style.transform = `rotate(${angle}deg)`;

      const rel = document.getElementById("relation");
      if (leftWeight === rightWeight) {
        document.body.style.backgroundColor = '#d7ffd7';
        rel.textContent = '=';
      } else if (leftWeight > rightWeight) {
        document.body.style.backgroundColor = '#ff4d4d';
        rel.textContent = '>';
      } else {
        document.body.style.backgroundColor = '#ff4d4d';
        rel.textContent = '<';
      }

      document.getElementById('leftVal').textContent = leftWeight - 2;
      document.getElementById('rightVal').textContent = rightWeight - 3;
    }

    document.getElementById('leftSlider').addEventListener('input', (e) => {
      const val = parseInt(e.target.value);
      leftWeight = val + 2;
      updateBlocks('leftScale', val, true);
      updateBalance();
    });

    document.getElementById('rightSlider').addEventListener('input', (e) => {
      const val = parseInt(e.target.value);
      rightWeight = val + 3;
      updateBlocks('rightScale', val, false);
      updateBalance();
    });

    updateBlocks('leftScale', 0, true);
    updateBlocks('rightScale', 0, false);
    updateBalance();
  </script>

  <!-- 과제 2로 이동하는 [이전] 버튼 -->
  <a class="prev-button" href="task2.html">이전</a>




<a class="next-button" style="position: fixed; right: 10px; bottom: 10px; padding: 10px 20px; background-color: #007BFF; color: #fff; text-decoration: none; border-radius: 5px; font-family: sans-serif; font-size: 16px;" href="task4.html">다음</a>

</body>
</html>
